<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Level Tersesat 99</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-window: rgba(10, 10, 20, 0.85);
            --color-white: #ffffff;
            --color-yellow: #ffcc00;
            --color-border-dim: #333344;
            --font-heading: 'Press Start 2P', monospace;
            --font-body: 'VT323', monospace;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            color: var(--color-white);
            font-family: var(--font-body);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* CRT Scanlines overlay */
        .crt-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.22) 50%);
            background-size: 100% 4px;
            z-index: 9999;
        }
        .pixel-box {
            background-color: var(--bg-window);
            border: 3px solid var(--color-white);
            box-shadow:
                inset 0 0 0 1px var(--color-border-dim),
                4px 4px 0 0 rgba(0,0,0,0.8);
            padding: 30px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .error-title {
            font-family: var(--font-heading);
            font-size: 14px;
            color: #ff3333;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .error-desc {
            font-size: 20px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .btn-home {
            display: inline-block;
            font-family: var(--font-heading);
            font-size: 10px;
            color: var(--color-yellow);
            border: 3px solid var(--color-white);
            background-color: transparent;
            padding: 12px 20px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s steps(1);
            box-shadow: 3px 3px 0 0 rgba(0,0,0,0.8);
        }
        .btn-home:hover {
            background-color: var(--color-white);
            color: var(--bg-primary);
            box-shadow: none;
            transform: translate(3px, 3px);
        }
        .retro-blink {
            animation: blink 1s infinite steps(1, start);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="pixel-box">
        <h1 class="error-title">◄ ERROR 404 ◄</h1>
        <p class="error-desc">
            SYSTEM ALERT:<br>
            Halaman tidak ditemukan. Sepertinya Anda keluar dari peta quest. <br>
            <span style="color: var(--color-yellow);">[ Tingkat Tersesat: Level 99 ]</span>
        </p>
        <a href="index.html" class="btn-home"><span class="retro-blink">▶</span> KEMBALI KE BERANDA</a>
    </div>
</body>
</html>
